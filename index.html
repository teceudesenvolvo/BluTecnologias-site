<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blu Tecnologias</title>
    <link rel="icon" type="image/png" href="/assets/LOGO BLU SISTEMAS_Prancheta 1.png" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],
            },
            colors: {
              blue: {
                50: '#f0f9ff',
                100: '#e0f2fe',
                200: '#bae6fd',
                300: '#7dd3fc',
                400: '#38bdf8',
                500: '#0ea5e9',
                600: '#00A1DF',
                700: '#0369a1',
                800: '#075985',
                900: '#0c4a6e',
              },
              cyan: {
                400: '#22d3ee',
                500: '#06b6d4',
                600: '#0891b2',
              }
            },
            animation: {
              'fade-in-down': 'fadeInDown 0.3s ease-out',
            },
            keyframes: {
              fadeInDown: {
                '0%': { opacity: '0', transform: 'translateY(-10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
            }
          },
        },
      }
    </script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>.space-y-5 > :not([hidden]) ~ :not([hidden]){margin-top:10px!important}.action-card{display:inline-flex;align-items:center;gap:.4rem;border:1px solid #e2e8f0;border-radius:.65rem;padding:.55rem .8rem;background:#fff;color:#475569;font-size:.75rem;font-weight:600;transition:.15s}.action-card:hover{border-color:#93c5fd;background:#eff6ff;color:#1d4ed8}.action-card.is-favorite{border-color:#fbbf24;background:#fffbeb;color:#b45309}.Secondary{display:flex;align-items:center;gap:.5rem;border:1px solid #e2e8f0;border-radius:.75rem;padding:.625rem 1rem;background:#fff;color:#334155;font-size:.875rem;font-weight:700;white-space:nowrap}.Secondary:hover{border-color:#93c5fd;background:#eff6ff;color:#1d4ed8}.Icon{display:inline-grid;place-items:center;border:1px solid #e2e8f0;border-radius:.5rem;padding:.5rem;background:#fff;color:#475569}.Icon:hover{border-color:#93c5fd;background:#eff6ff;color:#1d4ed8}</style>
  </head>
  <body>
    <div id="root"></div>
        <script type="module" src="./index.tsx"></script>
  </body>
</html>
