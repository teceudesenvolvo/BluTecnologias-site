        darkMode: 'class',

          extend: {
            fontFamily: {
              sans: ['Inter', 'sans-serif'],

            colors: {
              blue: {
                50: '#f0f9ff',

                500: '#0ea5e9',

                700: '#0369a1',
                800: '#075985',
                900: '#0c4a6e',
              },
              cyan: {
                400: '#22d3ee',
                500: '#06b6d4',
                600: '#0891b2',
              }
            },
            animation: {
              'fade-in-down': 'fadeInDown 0.3s ease-out',
            },
            keyframes: {
              fadeInDown: {
                '0%': { opacity: '0', transform: 'translateY(-10px)' },
                '100%': { opacity: '1', transform: 'translateY(0)' },
              },
            }
          },
        },
      }
